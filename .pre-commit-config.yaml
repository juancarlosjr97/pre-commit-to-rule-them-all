---
default_install_hook_types: [pre-commit]
repos:
  - repo: local
    hooks:
      - id: centralized-pre-commit-hooks-common
        name: centralized-pre-commit-hooks-common
        description: "Centralized pre-commit hooks for shared repository checks"
        entry: centralized-pre-commit-hooks-common
        language: python
        require_serial: true
        verbose: true
        stages:
          - pre-commit
      - id: centralized-pre-commit-hooks-python
        name: centralized-pre-commit-hooks-python
        description: "Centralized pre-commit hooks for Python"
        entry: centralized-pre-commit-hooks-python
        language: python
        require_serial: true
        verbose: true
        stages:
          - pre-commit
      - id: centralized-pre-commit-hooks-rust
        name: centralized-pre-commit-hooks-rust
        description: "Centralized pre-commit hooks for Rust"
        entry: centralized-pre-commit-hooks-rust
        language: python
        require_serial: true
        verbose: true
        stages:
          - pre-commit
...
